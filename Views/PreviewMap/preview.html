<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Overture Data Preview</title>

    <!--
      ArcGIS Maps SDK for JavaScript 5.1 via CDN.
      type="module" is REQUIRED on the script tag at 5.x — the CDN entry is an
      ES module and a classic script tag silently fails to define $arcgis.
      Modules are then loaded with $arcgis.import() (the Esri-recommended CDN
      pattern; AMD require() is deprecated at 5.0 and removed at 6.0).
      Both theme stylesheet paths are referenced; whichever the CDN serves for
      this version wins and the other 404s harmlessly.
    -->
    <link rel="stylesheet" href="https://js.arcgis.com/5.1/esri/themes/dark/main.css" />
    <link rel="stylesheet" href="https://js.arcgis.com/5.1/@arcgis/core/assets/esri/themes/dark/main.css" />
    <script type="module" src="https://js.arcgis.com/5.1/"></script>

    <style>
        html, body {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            overflow: hidden;
            background: #1a1a1a;
            font-family: "Segoe UI", -apple-system, sans-serif;
        }

        #viewDiv {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 28px;
        }

        #status-bar {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 28px;
            line-height: 28px;
            background: rgba(30, 30, 30, 0.95);
            color: #a0a0a0;
            font-size: 11px;
            padding: 0 10px;
            border-top: 1px solid #333;
            z-index: 10;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        #status-bar .status-text {
            flex: 1;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        #status-bar .layer-count {
            color: #4fc3f7;
            font-weight: 600;
            margin-left: 12px;
            white-space: nowrap;
        }

        /* Loading overlay */
        #loading-overlay {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 28px;
            background: rgba(26, 26, 26, 0.85);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 20;
            flex-direction: column;
        }

        #loading-overlay.active {
            display: flex;
        }

        #loading-overlay .spinner {
            width: 32px;
            height: 32px;
            border: 3px solid #333;
            border-top-color: #4fc3f7;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        #loading-overlay .loading-text {
            color: #a0a0a0;
            margin-top: 10px;
            font-size: 12px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Shown when the SDK cannot be reached (offline / blocked CDN) */
        #offline-notice {
            position: absolute;
            inset: 0;
            display: none;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            color: #a0a0a0;
            font-size: 13px;
            text-align: center;
            padding: 24px;
            z-index: 30;
            background: #1a1a1a;
        }
    </style>
</head>
<body>
    <div id="viewDiv"></div>

    <div id="offline-notice">
        <p><strong>Preview map unavailable.</strong></p>
        <p>The ArcGIS Maps SDK for JavaScript could not be loaded from js.arcgis.com.<br />
           Check your network connection or proxy settings. All other add-in features still work.</p>
    </div>

    <div id="loading-overlay">
        <div class="spinner"></div>
        <div class="loading-text">Loading layer...</div>
    </div>

    <div id="status-bar">
        <span class="status-text" id="statusText">Initializing map...</span>
        <span class="layer-count" id="layerCount"></span>
    </div>

    <script type="module">
        // ── State ──────────────────────────────────────────
        const previewLayers = [];
        let loadingCount = 0;

        const statusText = document.getElementById("statusText");
        const layerCountEl = document.getElementById("layerCount");
        const loadingOverlay = document.getElementById("loading-overlay");
        const loadingText = loadingOverlay.querySelector(".loading-text");

        function setStatus(text) {
            statusText.textContent = text;
        }

        function postToHost(msg) {
            if (window.chrome && window.chrome.webview) {
                window.chrome.webview.postMessage(JSON.stringify(msg));
            }
        }

        function showOfflineNotice() {
            document.getElementById("offline-notice").style.display = "flex";
            setStatus("Preview unavailable (SDK failed to load)");
            postToHost({ type: "previewUnavailable", error: "ArcGIS JS SDK failed to load from CDN" });
        }

        // Wait for the CDN module to define $arcgis. Module execution order
        // usually guarantees it's ready, but polling briefly makes this robust
        // to slow proxies and async global definition.
        async function waitForSdk(timeoutMs) {
            const start = Date.now();
            while (!window.$arcgis) {
                if (Date.now() - start > timeoutMs) return false;
                await new Promise((resolve) => setTimeout(resolve, 100));
            }
            return true;
        }

        if (await waitForSdk(8000)) {
            try {
                await initMap();
            } catch (err) {
                console.error("Preview init failed:", err);
                showOfflineNotice();
            }
        } else {
            // The CDN script failed to load (offline or blocked).
            showOfflineNotice();
        }

        async function initMap() {
            const [Map, MapView, GraphicsLayer, Graphic, Extent, reactiveUtils] =
                await $arcgis.import([
                    "@arcgis/core/Map.js",
                    "@arcgis/core/views/MapView.js",
                    "@arcgis/core/layers/GraphicsLayer.js",
                    "@arcgis/core/Graphic.js",
                    "@arcgis/core/geometry/Extent.js",
                    "@arcgis/core/core/reactiveUtils.js"
                ]);

            // ── Map Setup ──────────────────────────────────────
            const extentLayer = new GraphicsLayer({ title: "Selected Extent" });

            const map = new Map({
                basemap: "dark-gray-vector",
                layers: [extentLayer]
            });

            const view = new MapView({
                container: "viewDiv",
                map: map,
                zoom: 4,
                center: [-98, 39],
                ui: {
                    components: ["zoom", "compass"]
                },
                constraints: {
                    rotationEnabled: false
                }
            });

            await view.when();
            setStatus("Ready — waiting for commands from add-in");
            postToHost({ type: "mapReady" });

            // Send extent changes back to C# when the view becomes stationary.
            // Coordinates are in the view's spatial reference (typically Web
            // Mercator, wkid 102100) — the C# side projects to WGS84.
            reactiveUtils.when(
                () => view.stationary === true,
                () => {
                    const ext = view.extent;
                    if (!ext) return;
                    postToHost({
                        type: "extentChanged",
                        xmin: ext.xmin,
                        ymin: ext.ymin,
                        xmax: ext.xmax,
                        ymax: ext.ymax,
                        wkid: ext.spatialReference ? ext.spatialReference.wkid : 4326
                    });
                }
            );

            // ── C# → JS Message Handler ────────────────────────
            if (window.chrome && window.chrome.webview) {
                window.chrome.webview.addEventListener("message", (event) => {
                    let msg;
                    try {
                        msg = typeof event.data === "string"
                            ? JSON.parse(event.data)
                            : event.data;
                    } catch (e) {
                        console.error("Failed to parse message:", e);
                        return;
                    }

                    switch (msg.type) {
                        case "showExtent":
                            showExtentBox(msg.xmin, msg.ymin, msg.xmax, msg.ymax);
                            break;

                        case "addParquetLayer":
                            addParquetPreview(msg.url, msg.name, msg.renderer);
                            break;

                        case "addGeoJsonLayer":
                            addGeoJsonPreview(msg.url, msg.name, msg.renderer);
                            break;

                        case "clearLayers":
                            clearAllPreviewLayers();
                            break;

                        case "setBasemap":
                            map.basemap = msg.basemap;
                            break;

                        case "zoomTo":
                            view.goTo(new Extent({
                                xmin: msg.xmin, ymin: msg.ymin,
                                xmax: msg.xmax, ymax: msg.ymax,
                                spatialReference: { wkid: msg.wkid || 4326 }
                            }).expand(1.2));
                            break;

                        default:
                            console.warn("Unknown message type:", msg.type);
                    }
                });
            }

            // ── Commands ───────────────────────────────────────

            function showExtentBox(xmin, ymin, xmax, ymax) {
                extentLayer.removeAll();

                const extent = new Extent({
                    xmin: xmin, ymin: ymin,
                    xmax: xmax, ymax: ymax,
                    spatialReference: { wkid: 4326 }
                });

                extentLayer.add(new Graphic({
                    geometry: extent,
                    symbol: {
                        type: "simple-fill",
                        color: [0, 120, 255, 0.12],
                        outline: {
                            color: [0, 150, 255, 0.85],
                            width: 2,
                            style: "dash"
                        }
                    }
                }));

                view.goTo(extent.expand(1.4));

                setStatus("Extent: " +
                    xmin.toFixed(4) + ", " + ymin.toFixed(4) +
                    " → " + xmax.toFixed(4) + ", " + ymax.toFixed(4));
            }

            async function addParquetPreview(url, name, rendererDef) {
                showLoading("Loading " + name + "...");
                setStatus("Loading " + name + " from Parquet...");

                let ParquetLayer;
                try {
                    // ParquetLayer is beta; import it lazily so its absence
                    // doesn't break the rest of the preview.
                    [ParquetLayer] = await $arcgis.import(["@arcgis/core/layers/ParquetLayer.js"]);
                } catch (err) {
                    hideLoading();
                    setStatus("ParquetLayer not available in this SDK version.");
                    console.warn("ParquetLayer not available:", err);
                    postToHost({ type: "layerError", name: name, error: "ParquetLayer module unavailable" });
                    return;
                }

                // ParquetLayer requires GZIP/Snappy/uncompressed files and
                // takes a `urls` array (one or more files with the same schema).
                const layerConfig = {
                    title: name,
                    urls: [url]
                };
                if (rendererDef) {
                    layerConfig.renderer = rendererDef;
                }

                const layer = new ParquetLayer(layerConfig);

                layer.when(() => {
                    hideLoading();
                    setStatus(name + " loaded successfully");
                    updateLayerCount();
                    postToHost({ type: "layerLoaded", name: name, featureCount: -1 });
                }, (error) => {
                    hideLoading();
                    setStatus("Error loading " + name + ": " + error.message +
                        " (note: ZSTD-compressed files are not supported — re-export with SNAPPY or GZIP)");
                    console.error("ParquetLayer error:", error);
                    postToHost({ type: "layerError", name: name, error: error.message });
                });

                map.add(layer);
                previewLayers.push(layer);
            }

            async function addGeoJsonPreview(url, name, rendererDef) {
                showLoading("Loading " + name + "...");

                const [GeoJSONLayer] = await $arcgis.import(["@arcgis/core/layers/GeoJSONLayer.js"]);

                const layerConfig = {
                    url: url,
                    title: name
                };
                if (rendererDef) {
                    layerConfig.renderer = rendererDef;
                }

                const layer = new GeoJSONLayer(layerConfig);

                layer.when(() => {
                    hideLoading();
                    setStatus(name + " loaded successfully");
                    updateLayerCount();
                    postToHost({ type: "layerLoaded", name: name, featureCount: -1 });
                }, (error) => {
                    hideLoading();
                    setStatus("Error loading " + name + ": " + error.message);
                    postToHost({ type: "layerError", name: name, error: error.message });
                });

                map.add(layer);
                previewLayers.push(layer);
            }

            function clearAllPreviewLayers() {
                previewLayers.forEach((layer) => map.remove(layer));
                previewLayers.length = 0;
                extentLayer.removeAll();
                setStatus("Preview cleared");
                updateLayerCount();
            }

            // ── Helpers ────────────────────────────────────────

            function updateLayerCount() {
                layerCountEl.textContent = previewLayers.length > 0
                    ? previewLayers.length + " layer" + (previewLayers.length !== 1 ? "s" : "")
                    : "";
            }

            function showLoading(text) {
                loadingCount++;
                loadingText.textContent = text || "Loading...";
                loadingOverlay.classList.add("active");
            }

            function hideLoading() {
                loadingCount = Math.max(0, loadingCount - 1);
                if (loadingCount === 0) {
                    loadingOverlay.classList.remove("active");
                }
            }
        }
    </script>
</body>
</html>
