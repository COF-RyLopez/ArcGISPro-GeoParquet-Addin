<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Overture Data Preview</title>

    <!-- ArcGIS Maps SDK for JavaScript 5.1 (CDN) -->
    <link rel="stylesheet" href="https://js.arcgis.com/5.1/@arcgis/core/assets/esri/themes/dark/main.css" />
    <script src="https://js.arcgis.com/5.1/"></script>

    <style>
        html, body {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            overflow: hidden;
            background: #1a1a1a;
            font-family: "Segoe UI", -apple-system, sans-serif;
        }

        #viewDiv {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 28px;
        }

        #status-bar {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 28px;
            line-height: 28px;
            background: rgba(30, 30, 30, 0.95);
            color: #a0a0a0;
            font-size: 11px;
            padding: 0 10px;
            border-top: 1px solid #333;
            z-index: 10;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        #status-bar .status-text {
            flex: 1;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        #status-bar .layer-count {
            color: #4fc3f7;
            font-weight: 600;
            margin-left: 12px;
            white-space: nowrap;
        }

        /* Loading overlay */
        #loading-overlay {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 28px;
            background: rgba(26, 26, 26, 0.85);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 20;
            flex-direction: column;
        }

        #loading-overlay.active {
            display: flex;
        }

        #loading-overlay .spinner {
            width: 32px;
            height: 32px;
            border: 3px solid #333;
            border-top-color: #4fc3f7;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        #loading-overlay .loading-text {
            color: #a0a0a0;
            margin-top: 10px;
            font-size: 12px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div id="viewDiv"></div>

    <div id="loading-overlay">
        <div class="spinner"></div>
        <div class="loading-text">Loading layer...</div>
    </div>

    <div id="status-bar">
        <span class="status-text" id="statusText">Initializing map...</span>
        <span class="layer-count" id="layerCount"></span>
    </div>

    <script>
        require([
            "esri/Map",
            "esri/views/MapView",
            "esri/layers/GraphicsLayer",
            "esri/Graphic",
            "esri/geometry/Extent",
            "esri/geometry/SpatialReference"
        ], function (Map, MapView, GraphicsLayer, Graphic, Extent, SpatialReference) {

            // ── State ──────────────────────────────────────────
            const parquetLayers = [];
            let loadingCount = 0;

            const statusText = document.getElementById("statusText");
            const layerCountEl = document.getElementById("layerCount");
            const loadingOverlay = document.getElementById("loading-overlay");
            const loadingText = loadingOverlay.querySelector(".loading-text");

            // ── Map Setup ──────────────────────────────────────
            const extentLayer = new GraphicsLayer({ title: "Selected Extent" });

            const map = new Map({
                basemap: "dark-gray-vector",
                layers: [extentLayer]
            });

            const view = new MapView({
                container: "viewDiv",
                map: map,
                zoom: 4,
                center: [-98, 39],
                ui: {
                    components: ["zoom", "compass"]
                },
                constraints: {
                    rotationEnabled: false
                }
            });

            view.when(function () {
                setStatus("Ready — waiting for commands from add-in");
                notifyReady();
            });

            // Send extent changes back to C# when user stops panning
            view.watch("stationary", function (isStationary) {
                if (!isStationary) return;
                var ext = view.extent;
                if (!ext) return;

                // Project to WGS84 if needed
                var wgs84Ext = ext;
                if (ext.spatialReference && ext.spatialReference.wkid !== 4326) {
                    // For the extent notification we send raw coords;
                    // the C# side will handle projection if needed
                }

                postToHost({
                    type: "extentChanged",
                    xmin: ext.xmin,
                    ymin: ext.ymin,
                    xmax: ext.xmax,
                    ymax: ext.ymax,
                    wkid: ext.spatialReference ? ext.spatialReference.wkid : 4326
                });
            });

            // ── C# → JS Message Handler ────────────────────────
            if (window.chrome && window.chrome.webview) {
                window.chrome.webview.addEventListener("message", function (event) {
                    var msg;
                    try {
                        msg = typeof event.data === "string"
                            ? JSON.parse(event.data)
                            : event.data;
                    } catch (e) {
                        console.error("Failed to parse message:", e);
                        return;
                    }

                    switch (msg.type) {
                        case "showExtent":
                            showExtentBox(msg.xmin, msg.ymin, msg.xmax, msg.ymax);
                            break;

                        case "addParquetLayer":
                            addParquetPreview(msg.url, msg.name, msg.renderer);
                            break;

                        case "addGeoJsonLayer":
                            addGeoJsonPreview(msg.url, msg.name, msg.renderer);
                            break;

                        case "clearLayers":
                            clearAllPreviewLayers();
                            break;

                        case "setBasemap":
                            map.basemap = msg.basemap;
                            break;

                        case "zoomTo":
                            var zoomExtent = new Extent({
                                xmin: msg.xmin, ymin: msg.ymin,
                                xmax: msg.xmax, ymax: msg.ymax,
                                spatialReference: { wkid: msg.wkid || 4326 }
                            });
                            view.goTo(zoomExtent.expand(1.2));
                            break;

                        default:
                            console.warn("Unknown message type:", msg.type);
                    }
                });
            }

            // ── Commands ───────────────────────────────────────

            function showExtentBox(xmin, ymin, xmax, ymax) {
                extentLayer.removeAll();

                var extent = new Extent({
                    xmin: xmin, ymin: ymin,
                    xmax: xmax, ymax: ymax,
                    spatialReference: { wkid: 4326 }
                });

                var graphic = new Graphic({
                    geometry: extent,
                    symbol: {
                        type: "simple-fill",
                        color: [0, 120, 255, 0.12],
                        outline: {
                            color: [0, 150, 255, 0.85],
                            width: 2,
                            style: "dash"
                        }
                    }
                });

                extentLayer.add(graphic);
                view.goTo(extent.expand(1.4));

                setStatus("Extent: " +
                    xmin.toFixed(4) + ", " + ymin.toFixed(4) +
                    " → " + xmax.toFixed(4) + ", " + ymax.toFixed(4));
            }

            function addParquetPreview(url, name, rendererDef) {
                showLoading("Loading " + name + "...");
                setStatus("Loading " + name + " from Parquet...");

                // Use require to dynamically load ParquetLayer
                // (it may not be available in all SDK builds)
                require(["esri/layers/ParquetLayer"], function (ParquetLayer) {
                    var layerConfig = {
                        title: name
                    };

                    // Configure the data source
                    if (url.startsWith("http://") || url.startsWith("https://")) {
                        layerConfig.url = url;
                    }

                    if (rendererDef) {
                        layerConfig.renderer = rendererDef;
                    }

                    var layer = new ParquetLayer(layerConfig);

                    layer.when(function () {
                        hideLoading();
                        setStatus(name + " loaded successfully");
                        updateLayerCount();

                        postToHost({
                            type: "layerLoaded",
                            name: name,
                            featureCount: -1
                        });
                    }, function (error) {
                        hideLoading();
                        setStatus("Error loading " + name + ": " + error.message);
                        console.error("ParquetLayer error:", error);

                        postToHost({
                            type: "layerError",
                            name: name,
                            error: error.message
                        });
                    });

                    map.add(layer);
                    parquetLayers.push(layer);
                }, function (error) {
                    // ParquetLayer module not available — fall back to GeoJSON if possible
                    hideLoading();
                    setStatus("ParquetLayer not available in this SDK version. Try GeoJSON preview.");
                    console.warn("ParquetLayer not available:", error);
                });
            }

            function addGeoJsonPreview(url, name, rendererDef) {
                showLoading("Loading " + name + "...");

                require(["esri/layers/GeoJSONLayer"], function (GeoJSONLayer) {
                    var layerConfig = {
                        url: url,
                        title: name
                    };

                    if (rendererDef) {
                        layerConfig.renderer = rendererDef;
                    }

                    var layer = new GeoJSONLayer(layerConfig);

                    layer.when(function () {
                        hideLoading();
                        setStatus(name + " loaded successfully");
                        updateLayerCount();

                        postToHost({
                            type: "layerLoaded",
                            name: name,
                            featureCount: -1
                        });
                    }, function (error) {
                        hideLoading();
                        setStatus("Error loading " + name + ": " + error.message);
                    });

                    map.add(layer);
                    parquetLayers.push(layer);
                });
            }

            function clearAllPreviewLayers() {
                parquetLayers.forEach(function (layer) {
                    map.remove(layer);
                });
                parquetLayers.length = 0;
                extentLayer.removeAll();
                setStatus("Preview cleared");
                updateLayerCount();
            }

            // ── Helpers ────────────────────────────────────────

            function setStatus(text) {
                statusText.textContent = text;
            }

            function updateLayerCount() {
                layerCountEl.textContent = parquetLayers.length > 0
                    ? parquetLayers.length + " layer" + (parquetLayers.length !== 1 ? "s" : "")
                    : "";
            }

            function showLoading(text) {
                loadingCount++;
                loadingText.textContent = text || "Loading...";
                loadingOverlay.classList.add("active");
            }

            function hideLoading() {
                loadingCount = Math.max(0, loadingCount - 1);
                if (loadingCount === 0) {
                    loadingOverlay.classList.remove("active");
                }
            }

            function postToHost(msg) {
                if (window.chrome && window.chrome.webview) {
                    window.chrome.webview.postMessage(JSON.stringify(msg));
                }
            }

            function notifyReady() {
                postToHost({ type: "mapReady" });
            }
        });
    </script>
</body>
</html>
